<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <script>
  let a = +prompt('price 1');
  let b = +prompt('price 2');
  let c = +prompt('price 3');
  let sum = a + b + c;
  alert(`Сумма трёх товаров: ${sum}`)

  if (sum > 300) {
    alert('доставка бесплатная!');
  } else {
    deliverySE(sum);
  }
function deliverySE (sum){
           let delivery= prompt('тип доставки? (стандарт/экспресс)'); 
           let deliverySum;
           let premiumSum;
           let couponSum;
           
           if(delivery== 'стандарт'){
            deliverySum = sum + 20000;
            alert(`Итоговая сумма с стандартной доставкой: ${deliverySum}`)
        }
        else if(delivery == 'экспресс'){
            deliverySum = sum + 50000;
            alert(`Итоговая сумма с экспресс доставкой: ${deliverySum}`)
        }
        else{
            alert('неверный тип доставки')
            return
        } 
        
        let premium= prompt('ваш статус премиум?(да/нет)');
            if (premium ==='да'){
                premiumSum = deliverySum -(deliverySum * 0.1) .toFixed(0) ;
                alert(`Итоговая сумма с статусом-премиум: ${premiumSum}`)
            }
            else{
                premiumSum = deliverySum ;
                alert(`Итоговая сумма без статуса-премиум: ${premiumSum}`)
            }
        
        let couponDiscount= +prompt('ваш процент скидки по купону? (от 0 до 1)');
            if(couponDiscount>1){
                alert('скидка по купону превышает предел от 0 до 1')
                return
            }
        let couponActive =prompt('купон активен?(да/нет)') 
            if (couponActive==='да'){
                couponSum = premiumSum -(premiumSum * couponDiscount).toFixed(0);
                alert(`Итоговая сумма с купоном: ${couponSum}`)
            }
            else{
                couponSum = premiumSum;
                alert(`Итоговая сумма без купона: ${couponSum}`)
            }
        if (couponSum< 150){
            alert('Минимальная сумма заказа: 150');
            return
        }
        let balance =+prompt ('Ваш баланс на карте?');
            if(balance >= couponSum){
                alert ('Покупка успешна')
            }
            else{
                alert('Недостаточно средств')
            }

    }
  
</script>
</body>
</html>
