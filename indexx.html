<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
  let a = +prompt('price 1');
  let b = +prompt('price 2');
  let c = +prompt('price 3');
  let sum = a + b + c;

  if (sum > 300) {
    alert('доставка бесплатная!');
  } else {
    deliverySE(sum); // передаём сумму в функцию
  }

  function deliverySE(totalSum) {
    let delivery = prompt('тип доставки? (standart/express)');
    let finalSum;

    if (delivery === 'standart') {
      finalSum = totalSum + 20000;
      alert(`Итоговая сумма с стандартной доставкой: ${finalSum}`);
    } else if (delivery === 'express') {
      finalSum = totalSum + 50000;
      alert(`Итоговая сумма с экспресс‑доставкой: ${finalSum}`);
    } else {
      alert('неверный тип доставки');
      return; // прерываем выполнение при неверном вводе
    }

    let premium = prompt('ваш статус премиум? (да/нет)');

    if (premium === 'да') {
      let premiumSum = finalSum * 0.8; // скидка 20 %
      alert(`Сумма с премиум‑скидкой (20 %): ${premiumSum}`);
    } else if (premium === 'нет') {
      alert(`Итоговая сумма: ${finalSum}`);
    } else {
      alert('Некорректный ответ о премиум‑статусе. Итоговая сумма: ${finalSum}');
    }
  }
</script>

</body>
</html>
